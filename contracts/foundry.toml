# Foundry config for the Metriq contracts (Tallo, TaskRouter, RevealVerifier).
# Solidity 0.8.24. Fast fuzzing on the cap boundary is why we are on Foundry.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
# fuzz the cap boundary hard: the decline path is the spine of the design
fuzz = { runs = 512 }
# read the real Noir proof artifacts for the Ring 3 on-chain verification test
fs_permissions = [{ access = "read", path = "../circuits/reveal/target" }]

[rpc_endpoints]
xlayer_testnet = "${RPC_URL}"

[etherscan]
# X Layer verification is configured at deploy time (Phase 1A), not needed for tests.
