# Foundry config for the Metriq contracts (Tallo, TaskRouter, RevealVerifier).
# Solidity 0.8.24. Fast fuzzing on the cap boundary is why we are on Foundry.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
# Our contracts target 0.8.24 (pragma ^0.8.24); the compiler is 0.8.27 only because the
# bb-generated UltraHonk verifier (Ring 3) uses require(bool, CustomError()) from 0.8.26+.
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
# fuzz the cap boundary hard: the decline path is the spine of the design
fuzz = { runs = 512 }
# read the committed Noir proof fixture for the Ring 3 on-chain verification test
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

[rpc_endpoints]
xlayer_testnet = "${RPC_URL}"

[etherscan]
# X Layer verification is configured at deploy time (Phase 1A), not needed for tests.
